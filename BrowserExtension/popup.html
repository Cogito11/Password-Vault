<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="popup.css"></head><body><main>
<header><span class="mark"><img id="logoImage" src="icons/256x256.png" alt="Password Vault"></span><div><h1>Password Vault</h1><p id="siteLabel">Checking current site…</p></div><button id="lockButton" class="icon" title="Lock all books" hidden><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg></button></header>
<section id="bookView"><h2>Password books</h2><p class="subtle">Choose a book to browse and fill its passwords.</p><div id="bookList" class="entry-list"></div></section>
<section id="unlockView" class="card" hidden><h2 id="unlockTitle">Unlock book</h2><p>Enter this book's password.</p><input id="masterPassword" type="password" autocomplete="current-password" placeholder="Book password"><button id="unlockButton" class="primary">Unlock</button></section>
<section id="vaultView" hidden><div class="book-toolbar"><button id="backToBooks">‹ Books</button><h2 id="bookTitle"></h2></div><div class="actions"><button id="fillFirst" class="primary">Fill site login</button><button id="addToggle">Add login</button></div><form id="entryForm" class="card" hidden><input id="entryName" placeholder="Name (optional)"><input id="entryUrl" type="url" placeholder="Website URL" required><input id="entryUsername" autocomplete="username" placeholder="Username or email" required><div class="password-row"><input id="entryPassword" type="password" autocomplete="new-password" placeholder="Password" required><button type="button" id="togglePassword" title="Show password">Show</button><button type="button" id="generate">Generate</button></div><button class="primary" type="submit">Save login</button></form><h3 id="matchesHeading">This website</h3><p id="emptyMatches" class="empty">No saved logins for this website in this book.</p><div id="matchList" class="entry-list"></div><h3>All passwords</h3><input id="searchPasswords" class="search" type="search" placeholder="Search this book"><div id="entryList" class="entry-list"></div></section>
<p id="message" role="status"></p></main><script src="popup.js"></script></body></html>
