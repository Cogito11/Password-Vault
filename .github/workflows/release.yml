name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Source/package-lock.json

      - name: Install dependencies
        working-directory: Source
        run: npm ci

      - name: Build
        working-directory: Source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build